<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
<aside class="sidebar">
<div class="logo">

</div>
